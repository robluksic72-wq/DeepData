<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="DeepData"/>
<title>DeepData — Marine Encyclopedia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep: #020e1a;
    --ocean: #031d35;
    --mid: #0a3a5c;
    --accent: #1a9e75;
    --gold: #c9a84c;
    --text: #e8f4f0;
    --muted: #6a9bb5;
    --card-h: 100svh;
  }

  html, body {
    height: 100%;
    background: var(--deep);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: env(safe-area-inset-top, 12px) 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(2,14,26,0.95) 0%, transparent 100%);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  .counter {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: rgba(26,158,117,0.12);
    border: 1px solid rgba(26,158,117,0.25);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ── Feed ── */
  #feed {
    height: 100svh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  #feed::-webkit-scrollbar { display: none; }

  /* ── Card ── */
  .card {
    height: var(--card-h);
    scroll-snap-align: start;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .card-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    transition: transform 0.6s ease;
  }

  .card:hover .card-img { transform: scale(1.03); }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      transparent 35%,
      rgba(2,14,26,0.4) 50%,
      rgba(2,14,26,0.85) 70%,
      rgba(2,14,26,0.97) 100%
    );
  }

  .card-body {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 28px 24px calc(env(safe-area-inset-bottom, 20px) + 24px);
  }

  .card-ocean {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-ocean::before {
    content: '';
    display: inline-block;
    width: 16px;
    height: 1px;
    background: var(--accent);
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 7vw, 38px);
    font-weight: 700;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 4px;
  }

  .card-scientific {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--muted);
    background: rgba(255,255,255,0.05);
  }

  .tag.depth { border-color: rgba(26,158,117,0.3); color: #5fcfaa; }
  .tag.size  { border-color: rgba(201,168,76,0.3); color: var(--gold); }

  .divider {
    width: 32px;
    height: 1px;
    background: linear-gradient(to right, var(--accent), transparent);
    margin-bottom: 14px;
  }

  .card-fact {
    font-size: 14px;
    font-weight: 300;
    line-height: 1.65;
    color: rgba(232,244,240,0.82);
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Scroll hint ── */
  .scroll-hint {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 16px) + 8px);
    right: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    opacity: 0.4;
    animation: bounce 2s ease-in-out infinite;
  }

  .scroll-hint span {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .scroll-hint svg { width: 16px; height: 16px; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(5px); }
  }

  /* ── Loading / Error states ── */
  #loading, #error {
    height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px;
    text-align: center;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid rgba(26,158,117,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loading p { font-size: 13px; color: var(--muted); letter-spacing: 0.06em; }

  #error h2 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); }
  #error p  { font-size: 13px; color: var(--muted); line-height: 1.6; }
  #error code { font-size: 11px; background: rgba(255,255,255,0.06); padding: 8px 12px; border-radius: 6px; display: block; word-break: break-all; color: var(--accent); margin-top: 8px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">Deep<span>Data</span></div>
  <div class="counter" id="counter">Loading…</div>
</header>

<div id="loading">
  <div class="spinner"></div>
  <p>Diving into the deep…</p>
</div>

<div id="error" class="hidden">
  <h2>Setup needed</h2>
  <p>Open this file and add your Google Sheet ID and make it public. See instructions below.</p>
  <code id="err-msg"></code>
</div>

<div id="feed" class="hidden"></div>

<script>
// ─────────────────────────────────────────────
//  CONFIGURATION — edit these two values
// ─────────────────────────────────────────────
const SHEET_ID  = '1IJFW_A_uOTHFiF87mqRi9nURK6IKEbaoEUTctEazqJ0';   // ← paste your Google Sheet ID here
const SHEET_TAB = 'Sheet1';                  // ← your sheet tab name
// ─────────────────────────────────────────────

const FALLBACK_IMG = 'https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?w=800&q=80';

async function loadAnimals() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_TAB)}`;

  try {
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table.rows;
    
    // First row contains headers as data
    const headerRow = rows[0].c.map(c => c ? c.v : '');
    const dataRows = rows.slice(1);

    const animals = dataRows.map(row => {
      const obj = {};
      headerRow.forEach((col, i) => { 
        obj[col] = row.c[i] ? row.c[i].v : ''; 
      });
      return obj;
    }).filter(a => a['Animal Name']);

    return animals;
  } catch(e) {
    throw new Error(e.message);
  }
}

function colKey(animal, ...keys) {
  for (const k of keys) {
    const needle = k.toLowerCase().replace(/[^a-z0-9]/g,'');
    const found = Object.keys(animal).find(key => {
      const hay = key.toLowerCase().replace(/[^a-z0-9]/g,'');
      return hay.includes(needle) || needle.includes(hay);
    });
    if (found && animal[found]) return animal[found];
  }
  return '';
}

function buildCard(animal, index, total) {
  const name       = animal['Animal Name'] || colKey(animal, 'animal_name', 'name');
  const scientific = animal['Scientific Name'] || colKey(animal, 'scientific');
  const ocean      = animal['Ocean'] || colKey(animal, 'ocean');
  const depth      = animal['Depth'] || colKey(animal, 'depth');
  const size       = animal['Size'] || colKey(animal, 'size');
  const lifespan   = animal['Lifespan'] || colKey(animal, 'lifespan');
  const fact       = animal['Mind-Blowing Fact'] || colKey(animal, 'mind_blowing', 'fact');
  const imgUrl     = animal['Image URL'] || colKey(animal, 'image_url', 'image');

  const card = document.createElement('div');
  card.className = 'card';

  card.innerHTML = `
    <img class="card-img" 
         src="${imgUrl || FALLBACK_IMG}" 
         alt="${name}"
         onerror="this.src='${FALLBACK_IMG}'"
         loading="${index < 3 ? 'eager' : 'lazy'}"/>
    <div class="card-overlay"></div>
    <div class="card-body">
      ${ocean ? `<div class="card-ocean">${ocean}</div>` : ''}
      <h2 class="card-name">${name}</h2>
      ${scientific ? `<p class="card-scientific">${scientific}</p>` : ''}
      <div class="card-tags">
        ${depth    ? `<span class="tag depth">${depth}</span>` : ''}
        ${size     ? `<span class="tag size">${size}</span>` : ''}
        ${lifespan ? `<span class="tag">${lifespan}</span>` : ''}
      </div>
      <div class="divider"></div>
      ${fact ? `<p class="card-fact">${fact}</p>` : ''}
    </div>
    ${index < total - 1 ? `
    <div class="scroll-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>` : ''}
  `;

  return card;
}

async function init() {
  const loading = document.getElementById('loading');
  const error   = document.getElementById('error');
  const feed    = document.getElementById('feed');
  const counter = document.getElementById('counter');

  if (SHEET_ID === 'YOUR_GOOGLE_SHEET_ID') {
    loading.classList.add('hidden');
    error.classList.remove('hidden');
    document.getElementById('err-msg').textContent = 'Replace YOUR_GOOGLE_SHEET_ID in the HTML file with your actual Sheet ID';
    return;
  }

  try {
    const animals = await loadAnimals();

    if (!animals.length) {
      throw new Error('No animals found in sheet — check column headers and Sheet ID');
    }

    animals.forEach((animal, i) => {
      feed.appendChild(buildCard(animal, i, animals.length));
    });

    counter.textContent = `${animals.length} species`;
    loading.classList.add('hidden');
    feed.classList.remove('hidden');

  } catch(e) {
    loading.classList.add('hidden');
    error.classList.remove('hidden');
    document.getElementById('err-msg').textContent = e.message;
  }
}

init();
</script>
</body>
</html>
