<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="DeepData"/>
<link rel="apple-touch-icon" href="deepdata.png"/>
<link rel="icon" href="deepdata.png"/>
<title>DeepData — Marine Encyclopedia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #020e1a; color: #e8f4f0; font-family: 'DM Sans', sans-serif; overflow: hidden; }
  header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: env(safe-area-inset-top, 12px) 20px 12px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(to bottom, rgba(2,14,26,0.95) 0%, transparent 100%); }
  .logo { font-family: 'Playfair Display', serif; font-size: 22px; color: #e8f4f0; }
  .logo span { color: #1a9e75; }
  .counter { font-size: 11px; font-weight: 500; color: #1a9e75; letter-spacing: 0.08em; text-transform: uppercase; background: rgba(26,158,117,0.12); border: 1px solid rgba(26,158,117,0.25); padding: 4px 10px; border-radius: 20px; }
  #feed { height: 100svh; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  #feed::-webkit-scrollbar { display: none; }
  .card { height: 100svh; scroll-snap-align: start; position: relative; display: flex; flex-direction: column; overflow: hidden; background: #031d35; }
  .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 20%; transition: opacity 0.5s; }
  .card-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 0%, transparent 30%, rgba(2,14,26,0.5) 55%, rgba(2,14,26,0.92) 75%, #020e1a 100%); }
  .card-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 28px 24px calc(env(safe-area-inset-bottom, 20px) + 24px); }
  .card-ocean { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #1a9e75; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .card-ocean::before { content: ''; display: inline-block; width: 16px; height: 1px; background: #1a9e75; }
  .card-name { font-family: 'Playfair Display', serif; font-size: clamp(26px, 7vw, 38px); font-weight: 700; line-height: 1.1; color: #fff; margin-bottom: 4px; }
  .card-scientific { font-family: 'Playfair Display', serif; font-style: italic; font-size: 13px; color: #6a9bb5; margin-bottom: 14px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .tag { font-size: 10px; font-weight: 500; letter-spacing: 0.06em; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); color: #6a9bb5; background: rgba(255,255,255,0.05); }
  .tag.depth { border-color: rgba(26,158,117,0.3); color: #5fcfaa; }
  .tag.size { border-color: rgba(201,168,76,0.3); color: #c9a84c; }
  .divider { width: 32px; height: 1px; background: linear-gradient(to right, #1a9e75, transparent); margin-bottom: 12px; }
  .card-fact { font-size: 13px; font-weight: 300; line-height: 1.65; color: rgba(232,244,240,0.82); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body>
<header>
  <div class="logo">Deep<span>Data</span></div>
  <div class="counter" id="counter"></div>
</header>
<div id="feed"></div>
<script>
const SHEET_ID = '1IJFW_A_uOTHFiF87mqRi9nURK6IKEbaoEUTctEazqJ0';
const FALLBACK = 'https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?w=800&q=80';

async function getWikiImage(scientificName) {
  try {
    const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(scientificName)}&prop=pageimages&format=json&pithumbsize=1000&redirects=1&origin=*`;
    const res = await fetch(url);
    const data = await res.json();
    const pages = data.query.pages;
    const page = Object.values(pages)[0];
    return page?.thumbnail?.source || null;
  } catch(e) {
    return null;
  }
}

async function loadAnimals() {
  const url = `https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;
  const res = await fetch(url);
  return await res.json();
}

function buildCard(a, imgSrc) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <img class="card-img" src="${imgSrc || FALLBACK}" onerror="this.src='${FALLBACK}'" loading="lazy"/>
    <div class="card-overlay"></div>
    <div class="card-body">
      <div class="card-ocean">${a['Ocean'] || ''}</div>
      <h2 class="card-name">${a['Animal Name'] || ''}</h2>
      <p class="card-scientific">${a['Scientific Name'] || ''}</p>
      <div class="card-tags">
        ${a['Depth'] ? `<span class="tag depth">${a['Depth']}</span>` : ''}
        ${a['Size'] ? `<span class="tag size">${a['Size']}</span>` : ''}
        ${a['Lifespan'] ? `<span class="tag">${a['Lifespan']}</span>` : ''}
      </div>
      <div class="divider"></div>
      <p class="card-fact">${a['Mind-Blowing Fact'] || ''}</p>
    </div>`;
  return card;
}

async function init() {
  try {
    const animals = await loadAnimals();
    const feed = document.getElementById('feed');
    document.getElementById('counter').textContent = `${animals.length} species`;

    for (const a of animals) {
      const scientific = a['Scientific Name'] || a['animal_name'] || '';
      const sheetImg = a['Image URL'] || '';
      
      // Use sheet image if available, otherwise fetch from Wikipedia
      let imgSrc = sheetImg;
      if (!imgSrc && scientific) {
        imgSrc = await getWikiImage(scientific) || FALLBACK;
      }
      
      feed.appendChild(buildCard(a, imgSrc));
    }
  } catch(e) {
    document.body.innerHTML += `<p style="color:red;padding:40px">${e.message}</p>`;
  }
}
init();
</script>
</body>
</html>
